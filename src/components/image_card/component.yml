name: Image card
machineName: image_card
status: true
required: []
props:
  properties:
    image:
      type: object
      $ref: json-schema-definitions://canvas.module/image
      title: image
      examples:
        - src: >-
            https://placehold.co/800x600@2x.png?alternateWidths=https%3A%2F%2Fplacehold.co%2F%7Bwidth%7Dx%7Bheight%7D%402x.png
          alt: Example image placeholder
          width: 800
          height: 600
    title:
      type: string
      title: title
      examples:
        - Example title
    authorName:
      type: string
      title: authorName
      examples:
        - Serena
    publishDate:
      type: string
      format: date
      title: publishDate
      examples:
        - '2026-04-24'
slots: []
