name: Two Column Text
machineName: two_column_text
status: true
required:
  - layout
  - columnWidths
  - headingElement
  - headingSize
  - textColor
props:
  properties:
    image:
      type: object
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      examples:
        - src: >-
            https://placehold.co/800x600@2x.png?alternateWidths=https%3A%2F%2Fplacehold.co%2F%7Bwidth%7Dx%7Bheight%7D%402x.png
          alt: Example image placeholder
          width: 800
          height: 600
    layout:
      type: string
      enum:
        - text_image
        - image_text
      meta:enum:
        text_image: Text - Image
        image_text: Image - Text
      title: Layout
      examples:
        - text_image
    columnWidths:
      type: string
      enum:
        - '33_66'
        - '50_50'
        - '66_33'
      meta:enum:
        '33_66': Text 33% - Image 66%
        '50_50': Text 50% - Image 50%
        '66_33': Text 66% - Image 33%
      title: Column Widths
      examples:
        - '50_50'
    preHeading:
      type: string
      title: Pre Heading
      examples:
        - Mission
    heading:
      type: string
      title: Heading
      examples:
        - This space deserves a hero.
    headingElement:
      type: string
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: h1
        h2: h2
        h3: h3
        h4: h4
        h5: h5
        h6: h6
      title: Heading Element
      examples:
        - h2
    headingSize:
      type: string
      enum:
        - extra_large
        - large
        - medium
        - small
      meta:enum:
        extra_large: Extra Large
        large: Large
        medium: Medium
        small: Small
      title: Heading Size
      examples:
        - large
    text:
      type: string
      contentMediaType: text/html
      x-formatting-context: block
      title: Text
      examples:
        - >-
          This is a space to welcome visitors to the site. Grab their attention
          with copy that clearly states what the site is about.
    textColor:
      type: string
      enum:
        - dark
        - light
      meta:enum:
        dark: Dark
        light: Light
      title: Text Color
      examples:
        - dark
slots:
  buttons:
    title: Buttons
