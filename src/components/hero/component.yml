name: Hero
machineName: hero
status: true
required:
  - backgroundImage
  - layout
  - headingSize
  - textColor
props:
  properties:
    backgroundImage:
      type: object
      $ref: json-schema-definitions://canvas.module/image
      title: Background Image
      examples:
        - src: https://placehold.co/1920x1080@2x.png
          alt: Example image placeholder
          width: 1920
          height: 1080
    layout:
      type: string
      enum:
        - left_aligned
        - centered
      meta:enum:
        left_aligned: Left aligned
        centered: Centered
      title: Layout
      examples:
        - left_aligned
    preHeading:
      type: string
      title: Pre Heading
      examples:
        - Mission
    headingElement:
      type: string
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: h1
        h2: h2
        h3: h3
        h4: h4
        h5: h5
        h6: h6
      title: Heading Element
      examples:
        - h2
    headingSize:
      type: string
      enum:
        - extra_large
        - large
        - medium
        - small
      meta:enum:
        extra_large: Extra Large
        large: Large
        medium: Medium
        small: Small
      title: Heading Size
      examples:
        - extra_large
    heading:
      type: string
      title: Heading
      examples:
        - This space deserves a hero.
    text:
      type: string
      contentMediaType: text/html
      x-formatting-context: block
      title: Text
      examples:
        - >-
          This is a space to welcome visitors to the site. Grab their attention
          with copy that clearly states what the site is about.
    textColor:
      type: string
      enum:
        - dark
        - light
      meta:enum:
        dark: Dark
        light: Light
      title: Text Color
      examples:
        - dark
slots:
  buttons:
    title: Buttons
