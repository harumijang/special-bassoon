name: Card
machineName: card
status: true
required:
  - layout
  - linkVariant
props:
  properties:
    image:
      type: object
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      examples:
        - src: >-
            https://placehold.co/800x600@2x.png?alternateWidths=https%3A%2F%2Fplacehold.co%2F%7Bwidth%7Dx%7Bheight%7D%402x.png
          alt: Example image placeholder
          width: 800
          height: 600
    layout:
      type: string
      enum:
        - left_aligned
        - center_aligned
        - right_aligned
      meta:enum:
        left_aligned: Left aligned
        center_aligned: Center aligned
        right_aligned: Right aligned
      title: Layout
      examples:
        - left_aligned
    heading:
      type: string
      title: Heading
      examples:
        - Feature or benefit
    headingElement:
      type: string
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: h1
        h2: h2
        h3: h3
        h4: h4
        h5: h5
        h6: h6
      title: Heading Element
      examples:
        - h3
    byline:
      type: string
      title: Byline
      examples:
        - Alice Williams
    text:
      type: string
      contentMediaType: text/html
      x-formatting-context: block
      title: Text
      examples:
        - >-
          Help people become familiar with the organization and its offerings,
          creating a sense of connection and trust.
    link:
      type: string
      format: uri-reference
      title: Link
      examples:
        - /
    linkLabel:
      type: string
      title: Link Label
    linkVariant:
      type: string
      enum:
        - solid
        - outline_dark
        - link
        - link_underline
      meta:enum:
        solid: Solid
        outline_dark: Outline Dark
        link: Link
        link_underline: Link Underline
      title: Link Variant
      examples:
        - link
slots: []
